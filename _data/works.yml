  title: "CAPruner: Conceptual-Adjacent Scene Graph Pruner for Enhancing 3D Spatial Reasoning of Large Language Models"
  short_title: "CAPruner"
  authors: "Shengli Zhou, Xiangchen Wang, Guanhua Chen, Feng Zheng"
  venue: "ACL 2026"
  year: "2026"
  image: "/images/projects/capruner-poster.svg"
  code_url: "https://github.com/fz-zsl/CAPruner"
  paper_url: "https://www.researchgate.net/publication/404391563_CAPruner_Conceptual-Adjacent_Scene_Graph_Pruner_for_Enhancing_3D_Spatial_Reasoning_of_Large_Language_Models"
  summary: "CAPruner prunes 3D scene graphs by combining fuzzy semantic relevance with spatial proximity, preserving task-critical relations for more reliable 3D spatial reasoning."
