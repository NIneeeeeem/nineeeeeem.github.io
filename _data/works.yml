- slug: livevln
  date: "2026-04-21"
  title: "LiveVLN: Breaking the Stop-and-Go Loop in Vision-Language Navigation"
  short_title: "LiveVLN"
  authors: "Xiangchen Wang, Weiye Zhu, Teng Wang, TianTian Geng, Zekai Zhang, Zhiyuan Qi, Jinyu Yang, Feng Zheng"
  venue: "arXiv"
  year: "2026"
  image: "/images/projects/livevln-overview.png"
  project_url: "/livevln/"
  code_url: "https://github.com/NIneeeeeem/LiveVLN"
  paper_url: "https://arxiv.org/abs/2604.19536"
  summary: "LiveVLN is a training-free runtime framework for embodied navigation that overlaps execution with observation refresh so agents move continuously instead of waiting on every inference step."
  result: "StreamVLN waiting time drops from 7.32s to 1.63s; NaVIDA waiting time drops from 10.64s to 2.89s."
- slug: capruner
